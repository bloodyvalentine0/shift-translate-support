<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Shift Translate</title>

<style>

body{
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:60px auto;
    padding:20px;
    line-height:1.6;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#ccc;
}

.card{
    background:#1b1b1b;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
}

h2{
    margin-top:0;
}

.button{
    display:inline-block;
    margin-top:12px;
    padding:12px 18px;
    background:#3b82f6;
    color:white;
    text-decoration:none;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    transition:.2s;
}

.button:hover{
    background:#2563eb;
}

code{
    display:block;
    background:#222;
    padding:12px;
    border-radius:8px;
    margin-top:10px;
    margin-bottom:10px;
    word-break:break-all;
    font-size:15px;
}

</style>

</head>

<body>

<h1>❤️ Поддержать Shift Translate</h1>

<p>
Спасибо, что пользуетесь расширением.<br>
Если оно помогает вам — можете поддержать дальнейшую разработку ❤️
</p>

<div class="card">

<h2>🇺🇦 Monobank</h2>

<a class="button"
   href="https://send.monobank.ua/jar/24LXkvad3v"
   target="_blank">
Открыть банку
</a>

</div>

<div class="card">

<h2>🌍 PayPal</h2>

<code>moneymoneymoneypaypal@gmail.com</code>

<button
class="button copy-btn"
data-copy="moneymoneymoneypaypal@gmail.com">
📋 Копировать
</button>

</div>

<div class="card">

<h2>💰 USDT (TRC20)</h2>

<code>TVjTF63XDWSadxdzzj3UtyDRC89gGpQ6Ga</code>

<button
class="button copy-btn"
data-copy="TVjTF63XDWSadxdzzj3UtyDRC89gGpQ6Ga">
📋 Копировать
</button>

</div>

<script>

document.querySelectorAll(".copy-btn").forEach(button=>{

    button.addEventListener("click",async()=>{

        const text=button.dataset.copy;

        try{

            await navigator.clipboard.writeText(text);

            const oldText=button.textContent;

            button.textContent="✅ Скопировано!";

            setTimeout(()=>{
                button.textContent=oldText;
            },1500);

        }catch{

            alert("Не удалось скопировать.");

        }

    });

});

</script>

</body>
</html>
